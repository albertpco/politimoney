<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="PolitiMoney">
  <defs>
    <clipPath id="pm-circle">
      <circle cx="32" cy="32" r="30" />
    </clipPath>
  </defs>
  <g clip-path="url(#pm-circle)">
    <rect x="0" y="0" width="32" height="64" fill="#1a2540" />
    <rect x="32" y="0" width="32" height="64" fill="#d4a93c" />
  </g>

  <!-- Capitol building (left half) -->
  <g fill="#ffffff">
    <!-- spire + finial -->
    <rect x="15.25" y="14" width="1.5" height="4" />
    <circle cx="16" cy="13.5" r="1.1" />
    <!-- dome -->
    <path d="M11 23 Q11 16.5 16 16.5 Q21 16.5 21 23 Z" />
    <!-- entablature above columns -->
    <rect x="9" y="23" width="14" height="2.2" />
    <!-- columns -->
    <rect x="10" y="25.5" width="1.5" height="9" />
    <rect x="13" y="25.5" width="1.5" height="9" />
    <rect x="16" y="25.5" width="1.5" height="9" />
    <rect x="19" y="25.5" width="1.5" height="9" />
    <!-- floor / steps -->
    <rect x="8.5" y="34.7" width="15" height="2" />
    <rect x="7.5" y="37" width="17" height="2" />
    <rect x="6.5" y="39.3" width="19" height="2.2" />
  </g>

  <!-- Dollar sign (right half) — drawn as paths so it's font-independent -->
  <g fill="#ffffff">
    <!-- vertical bar through the S -->
    <rect x="47" y="14" width="2.6" height="36" />
    <!-- The "S" -->
    <path d="
      M55.5 22
      C55.5 18.4 52.6 16 48.3 16
      C44 16 41 18.6 41 22
      C41 25.6 43.7 27.2 48.3 28.4
      C52 29.4 53.7 30.4 53.7 32.6
      C53.7 35 51.4 36.4 48.3 36.4
      C45.4 36.4 43.4 35 42.7 32.6
      L39.4 33.4
      C40.4 37.4 43.7 39.4 48.3 39.4
      C53.4 39.4 57 37 57 32.4
      C57 28.4 54.2 26.6 49.5 25.4
      C45.6 24.4 44.3 23.4 44.3 21.6
      C44.3 19.6 46.1 18.4 48.3 18.4
      C50.7 18.4 52.4 19.6 52.7 22
      Z
    " />
  </g>
</svg>
